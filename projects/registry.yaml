# 项目注册表
# 所有由元仓库管理的业务项目均在此登记

projects:
  - id: example-project
    name: 示例项目
    description: 这是一个示例项目条目
    status: active                     # planning | active | paused | archived
    type: web-fullstack                # web-fullstack | api-service | cli-tool
    created_at: "2026-03-06"
    playbook: new-project

    repository:
      github_owner: yourname
      github_name: example-project
      repo_url: https://github.com/yourname/example-project
      default_branch: main
      local_path: ~/workspace/example-project
      branch_strategy: trunk           # trunk | gitflow
      setup_script_managed: true
      cleanup_script_managed: true

    tech_stack:
      - Next.js
      - TypeScript
      - PostgreSQL

    deploy_target: vercel              # vercel | railway | self-hosted

    vibekanban:
      organization_id: ""
      project_id: ""
      board_id: ""
      repo_id: ""

    docs:
      project_definition: docs/project-definition.md
      architecture: docs/architecture/architecture-init.md
      task_breakdown: docs/planning/task-breakdown.md
      adr_dir: docs/adrs
      issue_map: docs/meta/issue-map.yaml

    automation:
      default_executor: CODEX
      callback_policy: unlock-next-on-done
      merge_policy: agent-resolve
      auto_start_next_task: false
      create_issue_on_merge_conflict: true

    notes: ""

  - id: xhs-draft-platform
    name: 小红书 AI 草稿投递平台
    description: 面向多账号运营场景的 AI 图文生成与小红书草稿投递平台
    status: planning                     # planning | active | paused | archived
    type: web-fullstack                # web-fullstack | api-service | cli-tool
    created_at: "2026-03-07"
    playbook: new-project

    repository:
      github_owner: ccsert
      github_name: xhs-draft-platform
      repo_url: https://github.com/ccsert/xhs-draft-platform
      default_branch: main
      visibility: private
      local_path: /home/ccsert/project/xhs-draft-platform
      branch_strategy: trunk           # trunk | gitflow
      setup_script_managed: true
      cleanup_script_managed: true

    tech_stack:
      - Hono
      - React 19
      - Vite
      - shadcn/ui
      - Mastra
      - PostgreSQL
      - Redis
      - BullMQ
      - Playwright

    deploy_target: self-hosted         # vercel | railway | self-hosted

    vibekanban:
      organization_id: "80d2129f-e480-45ff-a650-9e877d985e1d"
      project_id: "05e17528-f380-456c-979d-8f4f1af9f196"
      board_id: ""
      repo_id: "3f769223-4139-4a05-8d86-fca3c3b8612e"

    docs:
      project_definition: docs/project-definition.md
      architecture: docs/architecture/architecture-init.md
      task_breakdown: docs/planning/task-breakdown.md
      adr_dir: docs/adrs
      issue_map: docs/meta/issue-map.yaml

    automation:
      default_executor: CODEX
      callback_policy: unlock-next-on-done
      merge_policy: agent-resolve
      auto_start_next_task: false
      create_issue_on_merge_conflict: true

    notes: "draft entry before repo creation; repo name and project name align to xhs-draft-platform; visibility set to private; primary notification provider is Feishu; VibeKanban organization_id/project_id/repo_id must be queried and backfilled via MCP only after GitHub repo creation and VibeKanban binding in stage 4-6."
